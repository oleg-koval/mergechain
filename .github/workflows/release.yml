name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      # Package dist/ for the Chrome Web Store, excluding source maps.
      - name: Package extension
        run: cd dist && zip -r "../mergechain-${{ github.ref_name }}.zip" . -x '*.map' && cd ..
      - uses: softprops/action-gh-release@v2
        with:
          files: mergechain-*.zip
          generate_release_notes: true
