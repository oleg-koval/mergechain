# Release notes configuration
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  categories:
    - title: 🚀 New Features & Improvements
      labels:
        - enhancement
        - feature
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 📚 Documentation
      labels:
        - documentation
        - docs
    - title: 🛠️ Maintenance & Chores
      labels:
        - chore
        - maintenance
        - refactor
        - ci
        - dependencies
    - title: 🤖 AI / Agent Skill
      labels:
        - enhancement  # reuse for AI/agent changes
    - title: Other Changes
      labels:
        - "*"
  exclude:
    labels:
      - duplicate
      - question
      - wontfix
      - invalid

# Note: Create repo labels (enhancement, bug, documentation, chore, etc.) if you want precise categorization.
# Currently falls back gracefully to "Other Changes" for unknown labels.
